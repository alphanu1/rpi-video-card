# Date:   2026-07-17
#
# CRTPi image recipe. Static, explicit file list -- no name substitution
# to silently fail (the stock rpi post-image script emitted an empty
# kernel entry under our custom-tarball config, which made mcopy copy the
# whole images/ dir into the vfat: "Disk full").

image boot.vfat {
	vfat {
		files = {
			"bcm2711-rpi-4-b.dtb",
			"rpi-firmware/cmdline.txt",
			"rpi-firmware/config.txt",
			"rpi-firmware/fixup4.dat",
			"rpi-firmware/start4.elf",
			"rpi-firmware/overlays",
			"Image"
		}
	}
	size = 64M
}

image rpi-video-card.img {
	hdimage {
		partition-table-type = "mbr"
	}
	partition boot {
		partition-type = 0xC
		bootable = "true"
		image = "boot.vfat"
	}
	partition rootfs {
		partition-type = 0x83
		image = "rootfs.ext4"
	}
}
